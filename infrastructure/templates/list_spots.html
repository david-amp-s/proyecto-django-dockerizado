{% extends 'base/base.html' %}

{% block content %}
<h2>Espacios del Parqueadero</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Estado</th>
    </tr>

    {% for spot in spots %}
    <tr>
        <td>{{ spot.id }}</td>
        <td>{{ spot.status }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="2">No hay espacios registrados</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
